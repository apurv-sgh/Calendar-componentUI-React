kind = "web"
previewPath = "/"
title = "3D Interactive Calendar"
version = "1.0.0"
id = "artifacts/calendar-3d"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21582

[services.development]
run = "pnpm --filter @workspace/calendar-3d run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/calendar-3d", "run", "build" ]
publicDir = "artifacts/calendar-3d/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21582"
BASE_PATH = "/"
